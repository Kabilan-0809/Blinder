<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blinder AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #22c55e;
      --red:    #ef4444;
      --amber:  #f59e0b;
      --blue:   #3b82f6;
      --purple: #a855f7;
      --bg:     #080b11;
      --card:   rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.09);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: #e5e7eb;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.04em; }
    #statusDot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4b5563;
      transition: background 0.4s;
      box-shadow: 0 0 0 0 transparent;
    }
    #statusDot.live {
      background: var(--green);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }

    /* ── VIDEO FEED ─────────────────────────────────────────────────────── */
    .video-wrapper {
      position: relative;
      width: 100%;
      height: 38dvh;
      background: #000;
      flex-shrink: 0;
      overflow: hidden;
    }
    #videoEl {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #overlayCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
    }

    /* Safety flash */
    #alertFlash {
      display: none;
      position: absolute; inset: 0;
      background: rgba(239,68,68,0.3);
      z-index: 20; pointer-events: none;
      animation: flash 0.5s ease-out forwards;
    }
    @keyframes flash { 0%{opacity:1} 100%{opacity:0} }

    /* ── STATE BADGE ─────────────────────────────────────────────────────── */
    #stateBadge {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      z-index: 15;
      transition: background 0.3s, color 0.3s;
      backdrop-filter: blur(8px);
    }

    /* ── CONVERSATION FEED ───────────────────────────────────────────────── */
    #chatFeed {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      scroll-behavior: smooth;
    }
    #chatFeed::-webkit-scrollbar { display: none; }

    .bubble {
      max-width: 86%;
      padding: 0.65rem 0.9rem;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.45;
      animation: bubbleIn 0.2s ease-out;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.ai {
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .bubble.user {
      background: rgba(59,130,246,0.18);
      border: 1px solid rgba(59,130,246,0.3);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      color: #93c5fd;
    }
    .bubble.safety {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 10px;
      align-self: stretch;
      color: #fca5a5;
      font-weight: 600;
      text-align: center;
    }
    .bubble.nav {
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.3);
      align-self: flex-start;
      color: #d8b4fe;
    }
    .bubble .label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 0.2rem;
    }

    /* Typing indicator */
    .typing-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 0.65rem 1rem;
      align-self: flex-start;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: #6b7280;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── MIC BAR ─────────────────────────────────────────────────────────── */
    .mic-bar {
      padding: 0.75rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #micBtn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      transition: transform 0.15s, box-shadow 0.3s, background 0.3s;
      background: var(--green);
      color: #000;
      box-shadow: 0 0 0 0 rgba(34,197,94,0);
      position: relative;
    }
    #micBtn:active { transform: scale(0.93); }
    #micBtn.recording {
      background: var(--red);
      color: #fff;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.6);
      animation: pulse-mic 1s infinite;
    }
    #micBtn.processing {
      background: var(--amber);
      color: #000;
      animation: spin-btn 1s linear infinite;
    }
    @keyframes pulse-mic {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
      100% { box-shadow: 0 0 0 18px rgba(239,68,68,0); }
    }
    @keyframes spin-btn {
      0%   { box-shadow: 0 0 0 8px rgba(245,158,11,0.4) }
      50%  { box-shadow: 0 0 0 16px rgba(245,158,11,0); }
      100% { box-shadow: 0 0 0 8px rgba(245,158,11,0.4) }
    }

    #micLabel {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      transition: color 0.2s;
    }

    #camBtn {
      position: absolute;
      right: 1rem;
      bottom: 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      color: #9ca3af;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #camBtn:hover { background: rgba(255,255,255,0.1); }

    canvas#hiddenCanvas { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>🦯 Blinder AI</h1>
    <div id="statusDot"></div>
  </header>

  <div class="video-wrapper">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div id="alertFlash"></div>
    <div id="stateBadge">⏹ Offline</div>
  </div>

  <div id="chatFeed">
    <div class="bubble ai">
      <div class="label">Blinder AI</div>
      Hello! Tap the mic and tell me where you'd like to go.
    </div>
  </div>

  <div class="mic-bar">
    <button id="micBtn" title="Hold to speak">🎤</button>
    <div id="micLabel">Tap to Speak</div>
    <button id="camBtn" title="Start / Stop Camera">📷</button>
  </div>

  <canvas id="hiddenCanvas"></canvas>

  <script>
    // ─── DOM ────────────────────────────────────────────────────────────────────
    const micBtn    = document.getElementById('micBtn');
    const micLabel  = document.getElementById('micLabel');
    const camBtn    = document.getElementById('camBtn');
    const chatFeed  = document.getElementById('chatFeed');
    const videoEl   = document.getElementById('videoEl');
    const overlay   = document.getElementById('overlayCanvas');
    const ctx       = overlay.getContext('2d');
    const hidden    = document.getElementById('hiddenCanvas');
    const hCtx      = hidden.getContext('2d', { willReadFrequently: true });
    const alertFlash = document.getElementById('alertFlash');
    const stateBadge = document.getElementById('stateBadge');
    const statusDot  = document.getElementById('statusDot');

    // ─── STATE ──────────────────────────────────────────────────────────────────
    let ws = null, camStream = null, frameIntervalId = null;
    let mediaRecorder = null, audioChunks = [];
    let isRecording = false, cameraOn = false;

    // ─── TTS ────────────────────────────────────────────────────────────────────
    const synth = window.speechSynthesis;
    let lastSpeechTime = 0;

    function speak(text, priority = 'normal') {
      if (!text) return;
      const age = Date.now() - lastSpeechTime;
      if (priority !== 'safety' && synth.speaking && age < 3500) return;
      if (synth.speaking) synth.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 1.05; utt.volume = 1.0;
      utt.onstart = () => { lastSpeechTime = Date.now(); };
      synth.speak(utt);
    }

    // ─── BUBBLES ────────────────────────────────────────────────────────────────
    let typingEl = null;

    function addBubble(type, text, label = '') {
      removeTyping();
      const d = document.createElement('div');
      d.className = `bubble ${type}`;
      if (label) d.innerHTML = `<div class="label">${label}</div>${text}`;
      else d.textContent = text;
      chatFeed.appendChild(d);
      chatFeed.scrollTop = chatFeed.scrollHeight;
      return d;
    }

    function showTyping() {
      removeTyping();
      typingEl = document.createElement('div');
      typingEl.className = 'typing-bubble';
      typingEl.innerHTML = '<span></span><span></span><span></span>';
      chatFeed.appendChild(typingEl);
      chatFeed.scrollTop = chatFeed.scrollHeight;
    }

    function removeTyping() {
      typingEl?.remove();
      typingEl = null;
    }

    // ─── STATE LABELS ───────────────────────────────────────────────────────────
    function setState(label, color = '#6b7280') {
      stateBadge.textContent = label;
      stateBadge.style.color = color;
      stateBadge.style.borderColor = color + '66';
      micLabel.textContent = label;
      micLabel.style.color = color;
    }

    // ─── WEBSOCKET ──────────────────────────────────────────────────────────────
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/stream`);

      ws.onopen = () => {
        statusDot.classList.add('live');
        setState('🟢 Connected — Tap to Speak', '#22c55e');
        console.log('[WS] Connected');
      };

      ws.onmessage = (evt) => {
        let data;
        try { data = JSON.parse(evt.data); } catch { return; }
        console.log('[WS RECV]', data.type, data.text || '');

        if (data.type === 'safety') {
          addBubble('safety', '⚠️ ' + data.text);
          speak(data.text, 'safety');
          flashRed();
          setState('⚠️ Hazard Detected!', '#ef4444');
          setTimeout(() => setState('🟢 Watch your surroundings', '#22c55e'), 3000);

        } else if (data.type === 'response') {
          removeTyping();
          if (data.transcript) addBubble('user', data.transcript);
          addBubble('ai', data.text, 'Blinder AI');
          speak(data.text);
          setState('🟢 Listening…', '#22c55e');

        } else if (data.type === 'navigation') {
          addBubble('nav', '🗺️ ' + data.text, 'Route');
          speak(data.text);

        } else if (data.type === 'route_loaded') {
          const msg = data.ok ? `Route loaded — ${data.steps} steps.` : 'Failed to load route.';
          addBubble('ai', msg, 'Blinder AI');
          speak(msg);

        } else if (data.type === 'error') {
          addBubble('safety', data.text);
        }
      };

      ws.onerror = () => setState('🔴 Connection error', '#ef4444');
      ws.onclose = () => {
        statusDot.classList.remove('live');
        setState('⏹ Disconnected', '#6b7280');
      };
    }

    // ─── CAMERA ─────────────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        if (camStream && videoEl.paused) {
           videoEl.play();
           frameIntervalId = setInterval(sendFrame, 500);
           cameraOn = true;
           camBtn.textContent = '📷';
           camBtn.title = 'Stop Camera';
           return;
        }

        camStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        videoEl.srcObject = camStream;
        videoEl.onloadedmetadata = () => {
          hidden.width = overlay.width = videoEl.videoWidth;
          hidden.height = overlay.height = videoEl.videoHeight;
          frameIntervalId = setInterval(sendFrame, 500); // 2fps
        };
        cameraOn = true;
        camBtn.textContent = '📷';
        camBtn.title = 'Stop Camera';
      } catch (e) {
        addBubble('safety', 'Camera access denied.');
      }
    }

    function stopCamera() {
      clearInterval(frameIntervalId);
      // Don't stop tracks immediately, just pause the feed visually
      // to avoid breaking mobile capture pipelines
      videoEl.pause();
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      cameraOn = false;
      camBtn.textContent = '📸';
      camBtn.title = 'Start Camera';
    }

    function sendFrame() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      hCtx.drawImage(videoEl, 0, 0, hidden.width, hidden.height);
      hidden.toBlob(blob => {
        if (!blob) return;
        const reader = new FileReader();
        reader.onload = () => {
          const b64 = reader.result.split(',')[1];
          ws.send(JSON.stringify({ type: 'frame', data: b64 }));
        };
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.65);
    }

    // ─── MIC RECORDING ──────────────────────────────────────────────────────────
    let micStream = null;
    
    async function startRecording() {
      if (!navigator.mediaDevices) return;
      
      try {
        // Reuse micStream if we already have it to avoid hardware conflicts
        if (!micStream) {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        }
        
        audioChunks = [];
        mediaRecorder = new MediaRecorder(micStream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        
        mediaRecorder.onstop = async () => {
          setMicState('processing');
          showTyping();
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = () => {
            const b64 = reader.result.split(',')[1];
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'audio', data: b64 }));
              console.log('[MIC] Audio sent to backend');
            }
          };
          reader.readAsDataURL(blob);
        };
        
        mediaRecorder.start();
        isRecording = true;
        setMicState('recording');
      } catch (e) {
        addBubble('safety', 'Microphone access denied or already in use.');
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
      }
    }

    function setMicState(state) {
      micBtn.classList.remove('recording', 'processing');
      if (state === 'recording') {
        micBtn.classList.add('recording');
        micBtn.textContent = '🔴';
        setState('🎙️ Recording…', '#ef4444');
        micLabel.textContent = 'Release to Send';
      } else if (state === 'processing') {
        micBtn.classList.add('processing');
        micBtn.textContent = '⏳';
        setState('⚙️ Processing…', '#f59e0b');
        micLabel.textContent = 'Processing…';
      } else {
        micBtn.textContent = '🎤';
        setState('🟢 Tap to Speak', '#22c55e');
      }
    }

    // ─── RED FLASH ──────────────────────────────────────────────────────────────
    function flashRed() {
      alertFlash.style.display = 'block';
      alertFlash.style.animation = 'none';
      requestAnimationFrame(() => {
        alertFlash.style.animation = 'flash 0.5s ease-out forwards';
        setTimeout(() => { alertFlash.style.display = 'none'; }, 600);
      });
    }

    // ─── EVENTS ─────────────────────────────────────────────────────────────────
    // Tap to toggle: first tap = start recording, second tap = stop and send
    micBtn.addEventListener('click', async () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        connectWS();
        addBubble('ai', 'Connecting to AI…', 'Blinder AI');
        return;
      }
      if (!isRecording) {
        await startRecording();
      } else {
        stopRecording();
      }
    });

    camBtn.addEventListener('click', () => {
      if (!cameraOn) {
        startCamera();
      } else {
        stopCamera();
      }
    });

    // GPS - send every 3 seconds if we have a goal
    if ('geolocation' in navigator) {
      setInterval(() => {
        if (ws?.readyState === WebSocket.OPEN) {
          navigator.geolocation.getCurrentPosition(pos => {
            ws.send(JSON.stringify({
              type: 'gps',
              lat: pos.coords.latitude,
              lng: pos.coords.longitude
            }));
          });
        }
      }, 3000);
    }

    // Auto-connect on load
    connectWS();
    startCamera();
  </script>
</body>
</html>
