<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind AI Navigator</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            background-color: #121212;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin: 1rem 0;
            text-align: center;
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            width: 90%;
            max-width: 400px;
            margin-bottom: 1rem;
        }

        button {
            flex: 1;
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        #startBtn {
            background-color: #4CAF50;
            color: white;
        }

        #stopBtn {
            background-color: #f44336;
            color: white;
        }

        button:disabled {
            background-color: #555 !important;
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            font-size: 1.2rem;
            text-align: center;
            color: #aaa;
            margin-bottom: 1rem;
            min-height: 2em;
            padding: 0 1rem;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 640px;
            aspect-ratio: 4/3;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Visible Video Feed */
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay Canvas for Bounding Boxes */
        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass through */
        }

        /* Hidden canvas just for extracting frames */
        #hiddenCanvas {
            display: none;
        }
    </style>
</head>

<body>

    <h1>Blind Navigator AI</h1>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="stopBtn" disabled>STOP</button>
    </div>

    <div id="status">Ready. Press START to begin.</div>

    <div class="video-container">
        <!-- The user sees this feed natively -->
        <video id="videoElement" autoplay playsinline></video>
        <!-- The browser draws bounding boxes here over the feed -->
        <canvas id="overlayCanvas"></canvas>
    </div>

    <!-- Used to grab and compress the JPEG behind the scenes -->
    <canvas id="hiddenCanvas"></canvas>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('status');

        const video = document.getElementById('videoElement');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');

        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

        let ws = null;
        let stream = null;
        let intervalId = null;
        let isRunning = false;

        // --- 1. Initialize Speech Synthesis --- //
        const synth = window.speechSynthesis;

        function speak(text, priority = "scene") {
            if (!text) return;

            console.log(`[TTS Request] Type: ${priority} | Text: ${text}`);

            if (priority === "alert") {
                synth.cancel(); // Instantly override
            } else if (priority === "scene" && synth.speaking) {
                console.log("[TTS] Dropped. Already speaking.");
                return; // Prevent speech queue build up
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;

            utterance.onstart = () => console.log(`[TTS Playing]: ${text}`);

            synth.speak(utterance);
        }

        // --- 2. Bounding Box Rendering --- //
        function drawOverlay(objects) {
            // Clear previous boxes
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (!objects || objects.length === 0) return;

            // The server extracts coords relative to the 320x240 backend resolution.
            // We need to scale them up to the native video resolution playing on the screen.
            const scaleX = overlayCanvas.width / 320.0;
            const scaleY = overlayCanvas.height / 240.0;

            objects.forEach(obj => {
                if (!obj.bbox) return;

                const [x1, y1, x2, y2] = obj.bbox;

                const sx1 = x1 * scaleX;
                const sy1 = y1 * scaleY;
                const sx2 = x2 * scaleX;
                const sy2 = y2 * scaleY;
                const width = sx2 - sx1;
                const height = sy2 - sy1;

                // Draw Box
                overlayCtx.strokeStyle = '#00FF00'; // Neon Green
                overlayCtx.lineWidth = 4;
                overlayCtx.strokeRect(sx1, sy1, width, height);

                // Draw Label Background
                overlayCtx.fillStyle = '#00FF00';
                overlayCtx.fillRect(sx1, sy1 - 24, overlayCtx.measureText(obj.type).width + 20, 24);

                // Draw Label Text
                overlayCtx.fillStyle = '#000000';
                overlayCtx.font = 'bold 16px Arial';
                overlayCtx.fillText(`${obj.type} (${obj.distance.toFixed(2)})`, sx1 + 5, sy1 - 6);
            });
        }

        // --- 3. Main Logic --- //
        async function startNavigation() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 480 }
                });
                video.srcObject = stream;

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/stream`);

                ws.onopen = () => {
                    isRunning = true;
                    statusText.textContent = "AI Connected. Listening...";
                    statusText.style.color = "white";
                    startBtn.disabled = true;
                    stopBtn.disabled = false;

                    speak("System started.", "alert");

                    video.onloadedmetadata = () => {
                        // Native resolution
                        hiddenCanvas.width = video.videoWidth;
                        hiddenCanvas.height = video.videoHeight;

                        // Overlay resolution needs to exactly match video internal Res to draw accurately
                        overlayCanvas.width = video.videoWidth;
                        overlayCanvas.height = video.videoHeight;

                        intervalId = setInterval(sendFrame, 250);
                    };
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        console.log("WebSocket Recv:", data);

                        // 1. Draw debug info on screen
                        if (data.objects) {
                            drawOverlay(data.objects);
                        }

                        // 2. Read instruction aloud via TTS
                        if (data.text) {
                            speak(data.text, data.type);

                            if (data.type === "alert") {
                                statusText.innerHTML = `⚠️ <span style="color:#f44336">${data.text}</span>`;
                            } else {
                                statusText.innerHTML = `👁️ <span style="color:#4CAF50">${data.text}</span>`;
                            }
                        }

                    } catch (e) {
                        console.error("Failed to parse response", e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket Error:', error);
                    stopNavigation("Connection error.");
                };

                ws.onclose = () => {
                    if (isRunning) stopNavigation("Disconnected from server.");
                };

            } catch (err) {
                console.error("Error accessing camera:", err);
                statusText.textContent = "Error: Camera access denied or unavailable.";
                speak("Error. Cannot access camera.", "alert");
            }
        }

        function sendFrame() {
            if (!isRunning || ws.readyState !== WebSocket.OPEN) return;

            // Draw current video frame to hidden canvas to grab the JPEG
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

            hiddenCanvas.toBlob((blob) => {
                if (blob) {
                    ws.send(blob);
                }
            }, 'image/jpeg', 0.5);
        }

        function stopNavigation(msg = "Navigation stopped.") {
            isRunning = false;

            if (intervalId) clearInterval(intervalId);
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();

            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            synth.cancel();
            speak(msg, "alert");

            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.textContent = "Ready. Press START to begin.";
            statusText.style.color = "#aaa";
        }

        startBtn.addEventListener('click', startNavigation);
        stopBtn.addEventListener('click', () => stopNavigation());
    </script>
</body>

</html>
