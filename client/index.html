<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blind Navigator AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            background: #0a0a0a;
            color: white;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #e0e0e0;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            flex: 1;
            overflow: hidden;
            background: #000;
        }

        #videoEl {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 1;
        }

        #overlayCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Status bar overlaid on bottom of video */
        #statusBar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 0.75rem 1rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            font-size: 1.05rem;
            font-weight: 500;
            min-height: 3rem;
            display: flex;
            align-items: flex-end;
            color: #eee;
        }

        .controls {
            width: 100%;
            display: flex;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        button {
            flex: 1;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
        }

        button:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        #startBtn {
            background: #22c55e;
            color: #000;
        }

        #stopBtn {
            background: #ef4444;
            color: #fff;
        }

        canvas#hiddenCanvas {
            display: none;
        }

        /* Alert flash overlay */
        #alertFlash {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 30;
            background: rgba(239, 68, 68, 0.25);
            pointer-events: none;
            animation: flash 0.4s ease-out;
        }

        @keyframes flash {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <header>🦯 Blind Navigator AI</header>

    <div class="video-wrapper">
        <video id="videoEl" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div id="statusBar">Ready. Press START.</div>
        <div id="alertFlash"></div>
    </div>

    <div class="controls">
        <button id="startBtn">▶ START</button>
        <button id="stopBtn" disabled>■ STOP</button>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <script>
        // ─── DOM ──────────────────────────────────────────────────────────────────
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusBar = document.getElementById('statusBar');
        const videoEl = document.getElementById('videoEl');
        const overlay = document.getElementById('overlayCanvas');
        const overlayCtx = overlay.getContext('2d');
        const hidden = document.getElementById('hiddenCanvas');
        const hiddenCtx = hidden.getContext('2d', { willReadFrequently: true });
        const alertFlash = document.getElementById('alertFlash');

        let ws = null, stream = null, intervalId = null, isRunning = false;

        // ─── TTS ──────────────────────────────────────────────────────────────────
        const synth = window.speechSynthesis;
        let lastSpeechStartTime = 0;

        function speak(text, priority = "scene") {
            if (!text) return;
            console.log(`[TTS][${priority}] "${text}"`);

            const speechAge = Date.now() - lastSpeechStartTime;

            if (priority === "alert") {
                synth.cancel(); // Always interrupt for danger
            } else {
                // Only block if speech started LESS than 3s ago (still fresh)
                if (synth.speaking && speechAge < 3000) {
                    console.log("[TTS] Skipped — fresh speech in progress.");
                    return;
                }
                if (synth.speaking) synth.cancel(); // Kill stale speech
            }

            const utt = new SpeechSynthesisUtterance(text);
            utt.rate = 1.05;
            utt.pitch = 1.0;
            utt.volume = 1.0;
            utt.onstart = () => { lastSpeechStartTime = Date.now(); console.log(`[TTS PLAYING] "${text}"`); };
            utt.onerror = (e) => console.error("[TTS ERROR]", e);
            synth.speak(utt);
        }

        // ─── BOUNDING BOX OVERLAY ─────────────────────────────────────────────────
        function drawOverlay(objects) {
            overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
            if (!objects || objects.length === 0) return;

            // YOLO runs at 640x480; scale to native display resolution
            const sx = overlay.width / 640;
            const sy = overlay.height / 480;

            objects.forEach(obj => {
                if (!obj.bbox) return;
                const [x1, y1, x2, y2] = obj.bbox;
                const rx = x1 * sx, ry = y1 * sy, rw = (x2 - x1) * sx, rh = (y2 - y1) * sy;

                const color = obj.distance > 0.3 ? '#ef4444' : '#22c55e';
                overlayCtx.strokeStyle = color;
                overlayCtx.lineWidth = 3;
                overlayCtx.strokeRect(rx, ry, rw, rh);

                // Label
                const label = `${obj.type} ${(obj.distance * 100).toFixed(0)}%`;
                overlayCtx.font = 'bold 13px system-ui';
                const tw = overlayCtx.measureText(label).width;
                overlayCtx.fillStyle = color;
                overlayCtx.fillRect(rx, ry - 20, tw + 10, 20);
                overlayCtx.fillStyle = '#000';
                overlayCtx.fillText(label, rx + 5, ry - 5);
            });
        }

        // ─── WEBSOCKET MESSAGE HANDLER ────────────────────────────────────────────
        function handleMessage(event) {
            let data;
            try { data = JSON.parse(event.data); } catch (e) { return; }
            console.log("[WS RECV]", data.type, data.text || "");

            // Always draw boxes
            drawOverlay(data.objects || []);

            if (data.type === "alert") {
                speak(data.text, "alert");
                statusBar.innerHTML = `⚠️ <span style="color:#f87171">${data.text}</span>`;
                // Flash red overlay
                alertFlash.style.display = 'block';
                alertFlash.style.animation = 'none';
                requestAnimationFrame(() => {
                    alertFlash.style.animation = 'flash 0.5s ease-out forwards';
                });
                setTimeout(() => { alertFlash.style.display = 'none'; }, 600);
            } else if (data.type === "scene" && data.text) {
                speak(data.text, "scene");
                statusBar.innerHTML = `👁️ ${data.text}`;
            }
            // type === "debug" → just update overlay, no TTS
        }

        // ─── START NAVIGATION ─────────────────────────────────────────────────────
        async function startNav() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoEl.srcObject = stream;

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}/stream`);

                ws.onopen = () => {
                    isRunning = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    statusBar.innerHTML = '🟢 AI connected. Scanning…';
                    speak("Navigation started.", "alert");

                    videoEl.onloadedmetadata = () => {
                        hidden.width = videoEl.videoWidth;
                        hidden.height = videoEl.videoHeight;
                        overlay.width = videoEl.videoWidth;
                        overlay.height = videoEl.videoHeight;
                        intervalId = setInterval(sendFrame, 250);
                    };
                };

                ws.onmessage = handleMessage;
                ws.onerror = () => stopNav("Connection error.");
                ws.onclose = () => { if (isRunning) stopNav("Disconnected."); };

            } catch (err) {
                console.error(err);
                statusBar.textContent = "Camera access denied.";
                speak("Error. Camera access denied.", "alert");
            }
        }

        // ─── SEND FRAME ───────────────────────────────────────────────────────────
        function sendFrame() {
            if (!isRunning || ws.readyState !== WebSocket.OPEN) return;
            hiddenCtx.drawImage(videoEl, 0, 0, hidden.width, hidden.height);
            hidden.toBlob(blob => { if (blob) ws.send(blob); }, 'image/jpeg', 0.65);
        }

        // ─── STOP NAVIGATION ──────────────────────────────────────────────────────
        function stopNav(msg = "Stopped.") {
            isRunning = false;
            clearInterval(intervalId);
            stream?.getTracks().forEach(t => t.stop());
            if (ws?.readyState === WebSocket.OPEN) ws.close();
            overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
            synth.cancel();
            speak(msg, "alert");
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusBar.textContent = "Ready. Press START.";
        }

        startBtn.addEventListener('click', startNav);
        stopBtn.addEventListener('click', () => stopNav());
    </script>
</body>

</html>
